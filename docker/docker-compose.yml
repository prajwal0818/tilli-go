services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deployflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-deployflow}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deployflow}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - deployflow

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - deployflow

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-deployflow}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-deployflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACK_TOKEN_SECRET: ${ACK_TOKEN_SECRET:?ACK_TOKEN_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - deployflow

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-deployflow}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-deployflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ACK_TOKEN_SECRET: ${ACK_TOKEN_SECRET:?ACK_TOKEN_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_DOMAIN: ${EMAIL_DOMAIN:-tilli.pro}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-DeployFlow}
      EMAIL_FALLBACK_TEAM: ${EMAIL_FALLBACK_TEAM:-ops}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h redis ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - deployflow

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        REACT_APP_API_URL: ./api
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - deployflow

volumes:
  pgdata:
  redisdata:

networks:
  deployflow:
    driver: bridge
